    <style>
        :root {
            --primary: #391969;
            --bg-color: #ececfe;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --accent: #5e2aab;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* ---------------- Sidebar Styles ---------------- */
        .sidebar {
            width: 280px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background-color: var(--card-bg);
            border-right: 1px solid rgba(57, 25, 105, 0.08);
            box-shadow: 2px 0 15px rgba(57, 25, 105, 0.03);
            padding: 2rem 0;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-header {
            padding: 0 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .sidebar-header h2 {
            color: var(--primary);
            font-size: 1.4rem;
            font-weight: 700;
        }

        .nav-links {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-links li {
            margin: 0.2rem 0;
        }

        .nav-links a {
            display: block;
            padding: 1rem 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            border-left: 4px solid transparent;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            background-color: rgba(57, 25, 105, 0.03);
            color: var(--primary);
        }

        .nav-links a.active {
            background-color: rgba(57, 25, 105, 0.08);
            color: var(--primary);
            border-left-color: var(--primary);
        }

        /* ---------------- Main Content Styles ---------------- */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 3rem 4rem;
        }

        header {
            text-align: left;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease;
        }

        h1 {
            color: var(--primary);
            font-size: 2.4rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .card {
            background-color: #ffffff;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(57, 25, 105, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(57, 25, 105, 0.08);
        }

        .chart-container {
            width: 100%;
        }


        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(57, 25, 105, 0.3);
            border-radius: 4px;
        }

        /* ---------------- Responsive ---------------- */
        @media(max-width: 992px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: sticky;
                top: 0;
                background-color: var(--card-bg);
                border-right: none;
                border-bottom: 1px solid rgba(0, 0, 0, 0.05);
                padding: 1rem 0;
                z-index: 100;
                box-shadow: 0 2px 10px rgba(57, 25, 105, 0.1);
            }

            .sidebar-header {
                margin-bottom: 1rem;
            }

            .nav-links {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
            }

            .nav-links a {
                padding: 0.5rem 1rem;
                border-left: none;
                border-bottom: 3px solid transparent;
            }

            .nav-links a.active {
                border-left-color: transparent;
                border-bottom-color: var(--primary);
                background-color: transparent;
            }

            .main-content {
                margin-left: 0;
                padding: 2rem;
            }
        }
    </style>
</head>

    <script>
        // Minimalist Monochromatic Palette based on #391969
        const colorPalette = [
            'rgb(57, 25, 105)',
            'rgba(57, 25, 105, 0.90)',
            'rgba(57, 25, 105, 0.80)',
            'rgba(57, 25, 105, 0.70)',
            'rgba(57, 25, 105, 0.60)',
            'rgba(57, 25, 105, 0.50)',
            'rgba(57, 25, 105, 0.40)',
            'rgba(57, 25, 105, 0.30)',
            'rgba(57, 25, 105, 0.20)',
            'rgba(57, 25, 105, 0.10)'
        ];

        const chartInstances = [];
        const resizeObserver = new ResizeObserver(entries => {
            requestAnimationFrame(() => {
                chartInstances.forEach(chart => {
                    if (chart) chart.resize();
                });
            });
        });

        document.addEventListener('DOMContentLoaded', () => {
            const csvText = document.getElementById('csv-data').textContent.trim();
            Papa.parse(csvText, {
                header: true, skipEmptyLines: true,
                complete: function (results) { processData(results.data); initScrollSpy(); }
            });
        });

        // ------------------ ScrollSpy ------------------
        function initScrollSpy() {
            const sections = document.querySelectorAll('.dashboard-section');
            const navLinks = document.querySelectorAll('.nav-links a');

            window.addEventListener('scroll', () => {
                let current = '';
                sections.forEach(section => {
                    const sectionTop = section.offsetTop;
                    // Add an offset so it highlights a bit earlier
                    if (pageYOffset >= sectionTop - 200) {
                        current = section.getAttribute('id');
                    }
                });

                navLinks.forEach(link => {
                    link.classList.remove('active');
                    if (link.getAttribute('href').substring(1) === current) {
                        link.classList.add('active');
                    }
                });
            });
        }

        // ------------------ DOM Builders ------------------
        function createSectionDiv(id, title) {
            document.getElementById('dashboard-sections').insertAdjacentHTML('beforeend', `
               <div id="${id}" class="dashboard-section" style="margin-bottom: 5rem; padding-top: 2rem; scroll-margin-top: 80px; animation: fadeInUp 0.8s ease;">
                  <h2 style="color:var(--primary); border-bottom:3px solid var(--accent); display:inline-block; padding-bottom:0.5rem; margin-bottom:2rem; font-size:1.6rem">${title}</h2>
                  <div class="dashboard-grid" style="display:grid; grid-template-columns: 1fr; gap: 2rem;"></div>
               </div>
            `);
        }
        function addChartBox(sectionId, chartId, isWide = false, customHeight = null) {
            let card = document.createElement('div');
            card.className = 'card';
            if (isWide) card.style.gridColumn = '1 / -1';
            let chartCon = document.createElement('div');
            chartCon.id = chartId;
            chartCon.className = 'chart-container';
            if (customHeight) {
                chartCon.style.height = customHeight;
            } else {
                chartCon.style.height = isWide ? '450px' : '380px';
            }
            card.appendChild(chartCon);
            document.getElementById(sectionId).querySelector('.dashboard-grid').appendChild(card);
        }

        // ------------------ Data Extraction ------------------
        function extractCounts(data, col, split = false) {
            let counts = {};
            data.forEach(r => {
                let v = r[col];
                if (!v || v.trim() === '') {
                    v = 'N/A';
                }

                if (split && v !== 'N/A') {
                    v.split(',').forEach(x => {
                        x = x.trim();
                        if (x) counts[x] = (counts[x] || 0) + 1;
                    });
                } else {
                    v = v.trim();
                    if (v) counts[v] = (counts[v] || 0) + 1;
                }
            });
            return Object.keys(counts).map(k => ({ name: k, value: counts[k] })).sort((a, b) => b.value - a.value);
        }

        // ------------------ ECharts Renderers ------------------
        function initChart(id, title, option) {
            const el = document.getElementById(id);
            const myChart = echarts.init(el);
            let defaultOption = {
                title: { text: title, textStyle: { color: '#391969', fontFamily: 'Inter', fontSize: 15, fontWeight: '600' } },
                tooltip: { trigger: 'item', textStyle: { fontFamily: 'Inter' }, confine: true },
                color: colorPalette
            };
            myChart.setOption(Object.assign({}, defaultOption, option));
            chartInstances.push(myChart);
            resizeObserver.observe(el);
            return myChart;
        }

        function renderDonut(id, title, data, col) {
            let counts = extractCounts(data, col);
            initChart(id, title, {
                series: [{ type: 'pie', radius: ['40%', '70%'], itemStyle: { borderRadius: 5, borderColor: '#fff', borderWidth: 2 }, data: counts }]
            });
        }

        function renderPie(id, title, data, col, split = false) {
            let counts = extractCounts(data, col, split);
            initChart(id, title, {
                series: [{ type: 'pie', radius: '70%', data: counts }]
            });
        }

        function renderTreemap(id, title, data, col) {
            let counts = extractCounts(data, col);
            initChart(id, title, {
                series: [{
                    type: 'treemap',
                    data: counts,
                    roam: false,
                    nodeClick: false,
                    breadcrumb: { show: false },
                    label: { show: true, formatter: '{b}\n({c})' }
                }]
            });
        }

        function renderColumn(id, title, data, col) {
            let counts = extractCounts(data, col);
            counts.sort((a, b) => a.name.localeCompare(b.name));
            initChart(id, title, {
                xAxis: { type: 'category', data: counts.map(x => x.name), axisLabel: { interval: 0, rotate: 25 } },
                yAxis: { type: 'value' },
                series: [{ type: 'bar', data: counts.map(x => x.value), itemStyle: { borderRadius: [5, 5, 0, 0] } }]
            });
        }

        function renderHBar(id, title, data, col, split = false, highlightColor = null) {
            let counts = extractCounts(data, col, split);
            counts.reverse(); // For ECharts bottom-up
            let seriesData = counts.map((x, i) => {
                if (highlightColor && i >= Object.keys(counts).length - 3) {
                    return { value: x.value, itemStyle: { color: highlightColor } }; // Highlight top 3
                }
                return x.value;
            });

            // Fix height dynamically if too many items
            let el = document.getElementById(id);
            if (el) el.style.height = Math.max(380, counts.length * 45) + 'px';

            initChart(id, title, {
                grid: { left: '5%', right: '5%', bottom: '5%', containLabel: true },
                xAxis: { type: 'value' },
                yAxis: { type: 'category', data: counts.map(x => x.name), axisLabel: { fontFamily: 'Inter', width: 220, overflow: 'truncate' } },
                series: [{ type: 'bar', data: seriesData, itemStyle: { borderRadius: [0, 5, 5, 0] } }]
            });
        }

        function renderStacked(id, title, data, xCol, yColSplit) {
            let xCats = extractCounts(data, xCol).map(x => x.name);
            let legendCats = new Set();
            let matrix = {};
            xCats.forEach(x => matrix[x] = {});

            data.forEach(r => {
                let xVal = r[xCol] ? r[xCol].trim() : null;
                if (!xVal || !matrix[xVal]) return;
                let yStr = r[yColSplit];
                if (yStr) {
                    yStr.split(',').forEach(y => {
                        y = y.trim();
                        if (y) { legendCats.add(y); matrix[xVal][y] = (matrix[xVal][y] || 0) + 1; }
                    });
                }
            });

            let legArr = Array.from(legendCats);
            let seriesData = legArr.map(leg => {
                return {
                    name: leg.length > 30 ? leg.substring(0, 30) + '...' : leg,
                    type: 'bar', stack: 'total',
                    data: xCats.map(x => matrix[x][leg] || 0)
                }
            });

            initChart(id, title, {
                legend: { type: 'scroll', bottom: 0 },
                grid: { bottom: '15%', left: '5%', right: '5%', containLabel: true },
                xAxis: { type: 'category', data: xCats.map(n => n.length > 15 ? n.substring(0, 15) + '...' : n), axisLabel: { rotate: 20 } },
                yAxis: { type: 'value' },
                series: seriesData
            });
        }

        function renderFunnel(id, title, data, col, split = false) {
            let counts = extractCounts(data, col, split);
            initChart(id, title, {
                series: [{
                    type: 'funnel',
                    left: '10%', top: 50, bottom: 20, width: '60%',
                    sort: 'descending', gap: 2,
                    label: { show: true, position: 'right' },
                    data: counts
                }]
            });
        }

        function renderPolarArea(id, title, data, col, split = false) {
            let counts = extractCounts(data, col, split);
            initChart(id, title, {
                series: [{
                    type: 'pie',
                    radius: [20, '70%'],
                    center: ['50%', '50%'],
                    roseType: 'area',
                    itemStyle: { borderRadius: 5 },
                    data: counts
                }]
            });
        }

        function renderRadar(id, title, data, col, split = true) {
            let counts = extractCounts(data, col, split);
            if (counts.length === 0) return;
            let max = counts[0].value + 1;
            let indicator = counts.map(c => ({ name: c.name, max: max }));
            initChart(id, title, {
                radar: {
                    indicator: indicator,
                    radius: '45%',
                    shape: 'polygon',
                    axisName: {
                        formatter: function (value) {
                            if (value.length > 20) {
                                return value.match(/.{1,20}(\s|$)/g).join('\n');
                            }
                            return value;
                        }
                    }
                },
                series: [{ type: 'radar', areaStyle: { opacity: 0.3 }, data: [{ value: counts.map(c => c.value), name: 'Deliverables' }] }]
            });
        }

        function renderClustered(id, title, data, col1, col2) {
            let c1 = extractCounts(data, col1);
            let c2 = extractCounts(data, col2);
            let allCats = Array.from(new Set([...c1.map(x => x.name), ...c2.map(x => x.name)]));
            let map1 = {}; c1.forEach(x => map1[x.name] = x.value);
            let map2 = {}; c2.forEach(x => map2[x.name] = x.value);

            initChart(id, title, {
                legend: { data: ['Spent Budget (Past 24 Months)', 'Considered Budget (Future)'], bottom: 0 },
                grid: { bottom: '10%', containLabel: true },
                xAxis: { type: 'category', data: allCats.map(n => n.length > 15 ? n.substring(0, 15) + '...' : n), axisLabel: { rotate: 20 } },
                yAxis: { type: 'value' },
                series: [
                    { name: 'Spent Budget (Past 24 Months)', type: 'bar', data: allCats.map(n => map1[n] || 0) },
                    { name: 'Considered Budget (Future)', type: 'bar', data: allCats.map(n => map2[n] || 0) }
                ]
            });
        }

        function render100Stacked(id, title, data, cols) {
            const scales = ['Not necessary', 'Useful in some cases', 'Very useful'];
            let chartData = scales.map(s => ({ name: s, type: 'bar', stack: 'total', barWidth: 30, data: [] }));
            let yLabels = [];

            cols.forEach(col => {
                let nameMatch = col.match(/\[(.*)\]/);
                let shortName = nameMatch ? nameMatch[1] : col;
                shortName = shortName.length > 25 ? shortName.substring(0, 25) + '...' : shortName;
                yLabels.push(shortName);

                let counts = {};
                data.forEach(r => { let v = r[col]; if (v) counts[v] = (counts[v] || 0) + 1; });
                let total = Object.values(counts).reduce((a, b) => a + b, 0);

                scales.forEach((scale, i) => {
                    let pct = total > 0 ? ((counts[scale] || 0) / total) * 100 : 0;
                    chartData[i].data.push(pct.toFixed(1));
                });
            });

            const customColors = ['#cccccc', '#8571a8', '#391969'];

            initChart(id, title, {
                color: customColors,
                legend: { bottom: 0 },
                grid: { left: '5%', right: '5%', bottom: '15%', containLabel: true },
                xAxis: { type: 'value', max: 100, axisLabel: { formatter: '{value} %' } },
                yAxis: { type: 'category', data: yLabels },
                series: chartData
            });
        }

        function processData(data) {

            // SECTION 1: Overview & Demographics
            createSectionDiv('overview', '1. Overview & Demographics');
            addChartBox('overview', 'c1'); renderDonut('c1', '1. Respondent Position', data, 'Position');
            addChartBox('overview', 'c2'); renderPie('c2', '2. Participation in Supplier Selection', data, 'Do you participate in selecting suppliers, proposing budgets, or approving costs for surveying/field monitoring activities?');
            addChartBox('overview', 'c3'); renderTreemap('c3', '3. Industry / Sector', data, 'Industry/Sector');
            addChartBox('overview', 'c4'); renderTreemap('c4', '4. Main Operating Area', data, 'Main Operating Area');
            addChartBox('overview', 'c5'); renderColumn('c5', '5. Total Area / Land Managed', data, 'Total Area/Land Managed');

            // SECTION 2: Operations & Current Status
            createSectionDiv('operations', '2. Operations & Current Status');
            addChartBox('operations', 'c6'); renderColumn('c6', '6. Average Projects per Year', data, 'Average number of surveying/monitoring projects per year');
            addChartBox('operations', 'c7'); renderHBar('c7', '7. Surveying Methods (Past 12 Months)', data, 'Methods used for surveying/monitoring in the past 12 months', true);
            addChartBox('operations', 'c8'); renderDonut('c8', '8. Hired External Suppliers (Past 24 Months)', data, 'Have you hired external suppliers for surveying/monitoring in the past 24 months?');
            addChartBox('operations', 'c9'); renderHBar('c9', '9. Type of Supplier Worked With', data, 'If yes, what type of supplier have you worked with?', true);
            addChartBox('operations', 'c10'); renderColumn('c10', '10. Frequency of Data Collection', data, 'Frequency of collecting or updating field data');
            addChartBox('operations', 'c11'); renderHBar('c11', '11. Software / Tools Used', data, 'Software/tools used to store, process, or track field data', true);
            addChartBox('operations', 'c12'); renderPie('c12', '12. Data Storage & Sharing Methods', data, 'How is field data usually stored or shared in recent deployments?', true);

            // SECTION 3: Pain Points & Problems
            createSectionDiv('pain-points', '3. Pain Points & Problems');

            addChartBox('pain-points', 'c17'); renderHBar('c17', '17. BIGGEST Need in the Next 12 Months', data, 'BIGGEST need to address related to the field in the next 12 months', false, '#5e2aab');

            addChartBox('pain-points', 'c13', true); renderStacked('c13', '13. Difficulties in Recent Surveying (By Industry)', data, 'Industry/Sector', 'Difficulties faced in the most recent surveying/monitoring');
            addChartBox('pain-points', 'c14', true); renderStacked('c14', '14. Difficulties in Recent Hiring (By Industry)', data, 'Industry/Sector', 'Biggest difficulty in the most recent hiring of a supplier');
            addChartBox('pain-points', 'c15'); renderHBar('c15', '15. Problems Encountered in Deployments (Top 3 Highlighted)', data, 'Have you encountered any of these problems in recent deployments?', true, '#5e2aab'); // Dark accent color for highlight
            addChartBox('pain-points', 'c16'); renderPolarArea('c16', '16. Biggest Barrier to Trying a New Supplier', data, 'Biggest barrier to trying a new supplier');
            addChartBox('pain-points', 'c18'); renderDonut('c18', '18. Most Valued Metric for Evaluation', data, 'Most valued metric when evaluating recent surveying/monitoring');

            // SECTION 4: Buying Behavior
            createSectionDiv('behavior', '4. Buying Behavior & Criteria');
            addChartBox('behavior', 'c19'); renderPie('c19', '19. Channels Searched for New Suppliers', data, 'Channels searched when finding a new supplier', true);
            addChartBox('behavior', 'c20'); renderFunnel('c20', '20. Information Checked First', data, 'Information checked first from a list of suppliers', true);
            addChartBox('behavior', 'c21'); renderFunnel('c21', '21. Top 3 Selection Criteria', data, 'Top 3 criteria for selecting a service provider', true);
            addChartBox('behavior', 'c22'); renderRadar('c22', '22. Most Useful Deliverables', data, 'Most useful deliverables', true);
            addChartBox('behavior', 'c23_24', true); renderClustered('c23_24', '23 & 24. Budget Summary: Past vs. Future', data, 'Approximate budget spent per surveying/monitoring project in the past 24 months', 'Considered budget for a similar future need');
            addChartBox('behavior', 'c25'); renderDonut('c25', '25. How is Cost Evaluated?', data, 'How is the cost for this type of service usually evaluated?');
            addChartBox('behavior', 'c26'); renderDonut('c26', '26. Form of Need Arisal', data, 'Under what form do surveying/monitoring needs usually arise?');
            addChartBox('behavior', 'c27'); renderPie('c27', '27. Most Suitable Purchasing Model', data, 'Most suitable service purchasing model');
            addChartBox('behavior', 'c28'); renderHBar('c28', '28. Payment Method', data, 'Payment method usually applied for outsourced services', false);

            // SECTION 5: Feature Evaluation
            createSectionDiv('features', '5. Feature Evaluation');
            let likertCols = [
                "Usefulness: [Support for flight permissions/procedures]",
                "Usefulness: [Online data portal / dashboard]",
                "Usefulness: [Fast processing and delivery]",
                "Usefulness: [Private secure data storage]",
                "Usefulness: [Support for in-depth data analysis]",
                "Usefulness: [Consulting on data integration into internal workflows]"
            ];
            addChartBox('features', 'c29', true); render100Stacked('c29', '29 -> 34. Usefulness of 6 Additional Items', data, likertCols);
            addChartBox('features', 'c35'); renderHBar('c35', '35. Top 2 Priorities (If Executed)', data, 'Top 2 priorities among the additional items above', true);

        }
    </script>
</body>
