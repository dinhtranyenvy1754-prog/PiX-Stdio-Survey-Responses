        // --- Data Processing Helpers ---
        const processSingleChoice = (data, key) => {
            const counts = {};
            data.forEach(row => {
                const val = row[key];
                if (val) counts[val] = (counts[val] || 0) + 1;
            });
            return Object.keys(counts)
                .map(k => ({ name: k, value: counts[k] }))
                .sort((a, b) => b.value - a.value);
        };

        const processMultiChoice = (data, key) => {
            const counts = {};
            data.forEach(row => {
                const val = row[key];
                if (val) {
                    val.split(',').map(s => s.trim()).forEach(v => {
                        if (v) counts[v] = (counts[v] || 0) + 1;
                    });
                }
            });
            return Object.keys(counts)
                .map(k => ({ name: k, value: counts[k] }))
                .sort((a, b) => b.value - a.value);
        };

        const sortOrdinalData = (processedData, orderArray) => {
            return processedData.sort((a, b) => {
                let i = orderArray.indexOf(a.name);
                let j = orderArray.indexOf(b.name);
                if (i === -1) i = 999;
                if (j === -1) j = 999;
                return i - j;
            });
        };
